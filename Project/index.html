<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Project | KarimSaoud</title>
    <meta
      name="description"
      content="Hub dei progetti di Karim Saoud con accesso alle sottocartelle dedicate."
    />
    <link rel="icon" type="image/png" href="../KS.png" />
    <style>
      :root {
        --bg: #fbfaf7;
        --surface: rgba(255, 255, 255, 0.88);
        --surface-strong: rgba(255, 255, 255, 0.96);
        --border: rgba(20, 20, 20, 0.12);
        --border-strong: rgba(20, 20, 20, 0.18);
        --text: #171717;
        --muted: #66625c;
        --shadow: 0 20px 44px rgba(18, 18, 18, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 14% 0%, rgba(223, 120, 92, 0.08), transparent 24%),
          radial-gradient(circle at 88% 12%, rgba(111, 149, 137, 0.08), transparent 20%),
          linear-gradient(180deg, #fffdfa 0%, var(--bg) 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(calc(100% - 2rem), 1040px);
        margin: 0 auto;
        padding: 3rem 0 2rem;
      }

      .hero {
        text-align: center;
        margin-bottom: 1.2rem;
      }

      h1,
      h2 {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        letter-spacing: -0.05em;
      }

      h1 {
        font-size: clamp(3rem, 8vw, 5.4rem);
        line-height: 0.95;
        font-weight: 650;
      }

      .lead {
        width: min(100%, 36rem);
        margin: 0.9rem auto 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .card {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 156px;
        padding: 1.1rem;
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        box-shadow: var(--shadow);
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          background-color 180ms ease,
          box-shadow 180ms ease;
      }

      .card:hover,
      .card:focus-visible {
        transform: translateY(-3px);
        border-color: var(--border-strong);
        background: var(--surface-strong);
      }

      .card-head {
        width: 100%;
        text-align: center;
      }

      .card-title {
        font-size: clamp(1.6rem, 3vw, 2.3rem);
        line-height: 1.05;
        font-weight: 620;
      }

      .card-kicker {
        display: block;
        margin-bottom: 0.35rem;
        color: var(--muted);
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .site-footer {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 1rem;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 1px solid var(--border);
      }

      .site-footer a {
        color: var(--muted);
        font-size: 0.9rem;
      }

      .footer-links {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1rem;
      }

      @media (max-width: 960px) {
        .page {
          width: min(calc(100% - 1.5rem), 1040px);
          padding: 2.25rem 0 1.75rem;
        }

        .hero {
          margin-bottom: 1rem;
        }

        .grid {
          gap: 0.85rem;
        }

        .card {
          min-height: 148px;
          padding: 1rem;
        }

        .site-footer {
          justify-content: center;
          text-align: center;
        }
      }

      @media (max-width: 720px) {
        .page {
          width: min(calc(100% - 1rem), 1040px);
          padding:
            max(1.5rem, env(safe-area-inset-top))
            env(safe-area-inset-right)
            max(1.5rem, env(safe-area-inset-bottom))
            env(safe-area-inset-left);
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .site-footer {
          flex-direction: column;
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>Project</h1>
      </section>

      <section class="grid" aria-label="Sottocartelle progetti">
        <a class="card" href="./App&Sotwere/index.html">
          <div class="card-head">
            <span class="card-kicker">Sottocartella</span>
            <h2 class="card-title">App&amp;Sotwere</h2>
          </div>
        </a>

        <a class="card" href="./brevetti/index.html">
          <div class="card-head">
            <span class="card-kicker">Sottocartella</span>
            <h2 class="card-title">Brevetti</h2>
          </div>
        </a>

      </section>

      <footer class="site-footer">
        <a href="../index.html">KarimSaoud</a>
        <div class="footer-links">
          <a href="../privacy.html">Privacy Policy</a>
          <a href="../cookie.html">Cookie Policy</a>
          <a href="../note-legali.html">Note legali</a>
          <a href="../accessibilita.html">Accessibilita</a>
        </div>
      </footer>
    </main>
  </body>
</html>
