<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Documenti Personali | KarimSaoud</title>
    <meta
      name="description"
      content="Hub dei documenti personali con sezioni dedicate ad auto, moto, assicurazioni e casa."
    />
    <link rel="icon" type="image/png" href="../KS.png" />
    <style>
      :root {
        --bg: #f3ede3;
        --surface: linear-gradient(180deg, rgba(255, 251, 246, 0.86), rgba(255, 247, 239, 0.74));
        --surface-strong: linear-gradient(180deg, rgba(255, 253, 249, 0.96), rgba(255, 248, 241, 0.9));
        --border: rgba(74, 57, 43, 0.12);
        --border-strong: rgba(74, 57, 43, 0.24);
        --text: #1f1812;
        --muted: #6d6257;
        --accent: #a55b2a;
        --secondary: #294f7a;
        --shadow: 0 26px 60px rgba(41, 79, 122, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 10% 0%, rgba(165, 91, 42, 0.14), transparent 26%),
          radial-gradient(circle at 88% 10%, rgba(41, 79, 122, 0.14), transparent 22%),
          radial-gradient(circle at 50% 100%, rgba(161, 122, 84, 0.08), transparent 30%),
          linear-gradient(180deg, #fffaf4 0%, var(--bg) 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(calc(100% - 2rem), 1100px);
        margin: 0 auto;
        padding: 3rem 0 2rem;
      }

      .hero {
        text-align: center;
        margin-bottom: 1.25rem;
      }

      h1,
      h2 {
        margin: 0;
        font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
        letter-spacing: -0.05em;
      }

      h1 {
        color: var(--secondary);
        font-size: clamp(3rem, 8vw, 5.2rem);
        line-height: 0.92;
        font-weight: 650;
        text-shadow: 0 8px 24px rgba(255, 255, 255, 0.55);
      }

      .lead {
        width: min(100%, 38rem);
        margin: 0.95rem auto 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.75rem;
        margin-top: 1.1rem;
      }

      .action-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.72rem 1rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface-strong);
        box-shadow: var(--shadow);
        color: var(--secondary);
        font-weight: 600;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 1rem;
      }

      .card {
        padding: 1.3rem;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--surface);
        box-shadow: var(--shadow);
        backdrop-filter: blur(12px);
      }

      .card h2 {
        font-size: clamp(1.45rem, 3vw, 2rem);
        line-height: 1.05;
      }

      .card p {
        margin: 0.6rem 0 0;
        color: var(--muted);
        line-height: 1.65;
      }

      .house-list {
        display: grid;
        gap: 0.55rem;
        margin-top: 0.8rem;
      }

      .house-item {
        padding: 0.8rem 0.9rem;
        border: 1px solid rgba(20, 20, 20, 0.08);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.7);
        color: var(--muted);
      }

      .footer {
        display: flex;
        justify-content: center;
        gap: 1rem;
        margin-top: 1rem;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .locked .protected-content {
        visibility: hidden;
      }

      .protected-content {
        visibility: visible;
      }

      .gate {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        padding: 1rem;
        background: rgba(244, 237, 227, 0.9);
        backdrop-filter: blur(12px);
      }

      .gate-card {
        width: min(100%, 420px);
        padding: 1.4rem;
        border: 1px solid var(--border);
        border-radius: 22px;
        background: var(--surface-strong);
        box-shadow: var(--shadow);
        text-align: center;
      }

      .gate-title {
        margin: 0;
        font-size: 1.6rem;
        line-height: 1.05;
      }

      .gate-copy {
        margin: 0.7rem 0 0;
        color: var(--muted);
        line-height: 1.6;
      }

      .gate-form {
        display: grid;
        gap: 0.75rem;
        margin-top: 1rem;
      }

      .gate-input {
        width: 100%;
        padding: 0.9rem 1rem;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: white;
        color: var(--text);
        font: inherit;
        text-align: center;
      }

      .gate-input:focus {
        outline: 2px solid rgba(20, 20, 20, 0.1);
        outline-offset: 2px;
      }

      .gate-button {
        padding: 0.85rem 1rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        color: var(--text);
        font: inherit;
        font-weight: 600;
        cursor: pointer;
      }

      .gate-error {
        min-height: 1.2rem;
        margin: 0;
        color: #9d3d3d;
        font-size: 0.88rem;
      }

      @media (max-width: 760px) {
        .page {
          width: min(calc(100% - 1rem), 1100px);
          padding: 1.5rem 0;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .card {
          border-radius: 18px;
        }
      }
    </style>
  </head>
  <body class="locked">
    <div class="gate" id="gate">
      <div class="gate-card">
        <h2 class="gate-title">Documenti Personali</h2>
        <p class="gate-copy" id="gate-message">enter password</p>
        <form class="gate-form" id="gate-form">
          <input
            class="gate-input"
            id="gate-input"
            type="text"
            autocomplete="off"
            autocapitalize="none"
            spellcheck="false"
          />
          <button class="gate-button" type="submit">Accedi</button>
        </form>
        <p class="gate-error" id="gate-error"></p>
      </div>
    </div>

    <main class="page protected-content">
      <section class="hero">
        <h1>Documenti Personali</h1>
      </section>

      <section class="grid" aria-label="Categorie documenti personali">
        <article class="card">
          <h2>Auto</h2>
        </article>

        <article class="card">
          <h2>Moto</h2>
        </article>

        <article class="card">
          <h2>Assicurazioni</h2>
        </article>

        <article class="card">
          <h2>Casa</h2>
          <div class="house-list">
            <div class="house-item">Assicurazione</div>
            <div class="house-item">Lavatrice</div>
            <div class="house-item">Lavastoviglie</div>
            <div class="house-item">Pompa di calore</div>
          </div>
        </article>
      </section>

      <div class="footer">
        <a href="../index.html">KarimSaoud</a>
        <a href="../privacy.html">Privacy Policy</a>
        <a href="../cookie.html">Cookie Policy</a>
        <a href="../note-legali.html">Note legali</a>
        <a href="../accessibilita.html">Accessibilita</a>
      </div>
    </main>

    <script>
      const steps = [
        { message: "enter password", password: "password" },
        { message: "password is incorrect", password: "incorrect" },
        { message: "try again", password: "again" },
        { message: "try again later", password: "again later" },
      ];

      const gate = document.getElementById("gate");
      const message = document.getElementById("gate-message");
      const form = document.getElementById("gate-form");
      const input = document.getElementById("gate-input");
      const error = document.getElementById("gate-error");
      const protectedContent = document.querySelector(".protected-content");
      let stepIndex = 0;

      const unlock = () => {
        document.body.classList.remove("locked");
        protectedContent.style.visibility = "visible";
        gate.style.display = "none";
        gate.setAttribute("aria-hidden", "true");
      };

      const renderStep = () => {
        message.textContent = steps[stepIndex].message;
        input.value = "";
        input.focus();
      };

      const normalize = (value) => value.toLowerCase().replace(/\s+/g, " ").trim();

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const attempt = normalize(input.value);

        if (attempt === steps[stepIndex].password) {
          error.textContent = "";
          stepIndex += 1;

          if (stepIndex >= steps.length) {
            unlock();
            return;
          }

          renderStep();
          return;
        }

        error.textContent = "Wrong password";
        input.select();
      });

      renderStep();
    </script>
  </body>
</html>
