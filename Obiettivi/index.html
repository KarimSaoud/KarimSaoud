<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Obiettivi | KarimSaoud</title>
    <meta
      name="description"
      content="Spazio dedicato agli obiettivi personali e professionali di Karim Saoud."
    />
    <link rel="icon" type="image/png" href="../KS.png" />
    <style>
      :root {
        --bg: #fbfaf7;
        --surface: rgba(255, 255, 255, 0.9);
        --border: rgba(20, 20, 20, 0.12);
        --text: #171717;
        --muted: #66625c;
        --shadow: 0 20px 44px rgba(18, 18, 18, 0.06);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 0%, rgba(223, 120, 92, 0.08), transparent 24%),
          radial-gradient(circle at 88% 10%, rgba(111, 149, 137, 0.08), transparent 20%),
          linear-gradient(180deg, #fffdfa 0%, var(--bg) 100%);
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(calc(100% - 2rem), 900px);
        margin: 0 auto;
        padding: 4rem 0 3rem;
      }

      .panel {
        padding: 2rem;
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 7vw, 4.8rem);
        line-height: 0.95;
        letter-spacing: -0.05em;
      }

      p {
        margin: 1rem 0 0;
        color: var(--muted);
        line-height: 1.7;
      }

      .back-link {
        display: inline-block;
        margin-top: 1.5rem;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="panel">
        <h1>Obiettivi</h1>
        <p>Questa sezione e pronta per raccogliere obiettivi, traguardi e piani futuri.</p>
        <a class="back-link" href="../index.html">Torna alla home</a>
      </section>
    </main>
  </body>
</html>
